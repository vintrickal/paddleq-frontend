<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PaddleQ — Court (iPad)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Faster+One&family=Dela+Gothic+One&family=Chivo:wght@400;600;700;900&family=Indie+Flower&family=Covered+By+Your+Grace&display=swap" rel="stylesheet" />
<style>
  :root {
    --paddle-green: rgb(45,119,73);
    --paddle-green-dark: rgb(34, 95, 58);
    --paddle-green-soft: rgba(45,119,73,0.10);
    --ink: #141414;
    --ink-soft: #5a5a5a;
    --ink-faint: #8a8a8a;
    --line: rgba(0,0,0,0.08);
    --paper: #f3f3ef;
    --tile: #ffffff;
    --warn: #C7891B;
    --rest: #8a8a8a;
    --active: rgb(14,146,14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Chivo", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== app shell (full-bleed website) ===== */
  .ipad {
    width: 100vw;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
  }
  .ipad__screen {
    width: 100%;
    min-height: 100vh;
    background: var(--paper);
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "topbar topbar"
      "main rail";
  }

  /* ===== topbar ===== */
  .topbar {
    grid-area: topbar;
    height: 72px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 0 28px;
    display: flex; align-items: center; gap: 18px;
  }
  .topbar__brand { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
  .topbar__brand img { width: 40px; height: 40px; }
  .wordmark {
    font-family: "Faster One", cursive;
    font-size: 26px; letter-spacing: 1px; color: var(--ink);
  }
  .meta-row {
    display: flex; align-items: center; gap: 14px;
    font-family: "Dela Gothic One", system-ui;
    font-size: 12px; letter-spacing: 1.5px;
    color: var(--ink-soft);
  }
  .meta-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--paddle-green); }
  .meta-row .live-dot { color: var(--paddle-green); }

  .topbar__spacer { flex: 1; }
  .topbar__icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: white;
    display: grid; place-items: center;
    color: var(--ink); cursor: pointer;
    transition: background 140ms;
  }
  .topbar__icon:hover { background: var(--paddle-green-soft); }
  .topbar__back {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: white; color: var(--ink);
    display: grid; place-items: center; cursor: pointer;
  }

  /* ===== main court area ===== */
  .main {
    grid-area: main;
    padding: 22px 22px 22px 28px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 16px;
    overflow: hidden;
  }
  .main__head {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .main__title {
    font-family: "Dela Gothic One", system-ui;
    font-size: 22px; color: var(--ink);
    margin: 0;
  }
  .main__sub {
    font-family: "Covered By Your Grace", cursive;
    font-size: 18px; color: var(--ink-soft);
  }
  .court-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    min-height: 0;
  }

  /* ===== court card ===== */
  .court {
    background: var(--tile);
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    padding: 14px 16px 14px;
    display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .court--empty { background: #faf9f5; border-style: dashed; }
  .court__head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .court__name {
    font-family: "Dela Gothic One", system-ui;
    font-size: 14px; letter-spacing: 0.5px;
    color: var(--ink);
  }
  .court__status {
    font-family: "Dela Gothic One", system-ui;
    font-size: 9px; letter-spacing: 1.4px;
    padding: 4px 8px; border-radius: 99px;
    background: var(--paddle-green); color: white;
  }
  .court__status.empty { background: rgba(0,0,0,0.08); color: var(--ink-soft); }
  .court__status.live::before {
    content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: white; margin-right: 6px; vertical-align: middle;
    animation: pulseLive 1.4s ease-in-out infinite;
  }
  @keyframes pulseLive { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .timer {
    margin-left: auto;
    font-family: "Chivo", system-ui; font-weight: 700; font-size: 12px;
    color: var(--ink-soft);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .court__edit {
    width: 28px; height: 28px;
    border: 1px solid var(--line);
    background: white; border-radius: 8px;
    display: grid; place-items: center;
    cursor: pointer; color: var(--ink-soft);
  }

  /* match layout: 2 teams + VS divider, distributed across the card */
  .match {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: stretch;
    min-height: 0;
  }
  .team {
    display: flex; flex-direction: column;
    background: rgba(45,119,73,0.04);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 10px 8px;
    gap: 8px;
    min-width: 0;
  }
  .team__title {
    font-family: "Dela Gothic One", system-ui;
    font-size: 10px; letter-spacing: 1.4px;
    color: var(--paddle-green);
  }
  .team__player {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 0;
  }
  .team__avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    font-family: "Dela Gothic One", system-ui;
    font-size: 12px; letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .team__name { font-weight: 700; font-size: 14px; line-height: 1.1; }
  .team__skill { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

  .match__divider {
    align-self: center;
    font-family: "Dela Gothic One", system-ui;
    font-size: 14px; letter-spacing: 1px;
    color: var(--ink-faint);
  }

  .court__actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-top: 10px;
  }
  .winner-btn {
    appearance: none; border: none;
    background: var(--paddle-green); color: white;
    height: 44px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer;
    font-family: "Dela Gothic One", system-ui; font-size: 12px;
    transition: background 140ms ease, transform 80ms ease;
  }
  .winner-btn:hover { background: var(--paddle-green-dark); }
  .winner-btn:active { transform: scale(0.98); }
  .winner-btn small { display: block; font-size: 9px; opacity: 0.78; letter-spacing: 0.8px; }

  /* empty court CTA */
  .court__body {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 10px;
    color: var(--ink-soft);
  }
  .court__body .icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(0,0,0,0.05);
    display: grid; place-items: center;
    color: var(--ink-soft);
  }
  .court__body p { font-size: 13px; line-height: 1.45; margin: 0; max-width: 220px; }
  .queue-cta {
    appearance: none; border: 1.5px solid var(--paddle-green);
    background: white; color: var(--paddle-green);
    padding: 10px 18px; border-radius: 99px;
    font-family: "Dela Gothic One", system-ui; font-size: 11px; letter-spacing: 1px;
    cursor: pointer;
    transition: all 140ms ease;
  }
  .queue-cta:hover { background: var(--paddle-green); color: white; }

  /* ===== fade-and-center winner transition ===== */
  .court.is-fading .court__head,
  .court.is-fading .match__divider,
  .court.is-fading .team--lose {
    opacity: 0;
    transition: opacity 700ms ease;
  }
  .court.is-fading .team--win {
    animation: winnerCenter 1800ms ease-in-out forwards;
    grid-column: 1 / -1;
    justify-self: center;
    width: 70%;
  }
  .court.is-fading .court__actions {
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  @keyframes winnerCenter {
    0%   { opacity: 1; transform: scale(1); }
    25%  { opacity: 1; transform: scale(1.03); }
    55%  { opacity: 1; transform: scale(1.03); }
    100% { opacity: 0; transform: scale(1.03); }
  }
  .court.is-fading .team--win .team__title {
    color: var(--paddle-green-dark);
    font-size: 13px;
  }
  .court.is-fading .team--win .team__title::before { content: "🏆 "; }

  /* ===== right rail (queue) ===== */
  .rail {
    grid-area: rail;
    background: white;
    border-left: 1px solid var(--line);
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    overflow: hidden;
  }
  .rail__head {
    padding: 18px 22px 12px;
    border-bottom: 1px solid var(--line);
  }
  .rail__title {
    font-family: "Dela Gothic One", system-ui;
    font-size: 16px; margin: 0 0 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .rail__title .pill {
    font-size: 10px; letter-spacing: 1px;
    background: var(--paddle-green); color: white;
    padding: 3px 9px; border-radius: 99px;
  }
  .rail__sub {
    font-family: "Covered By Your Grace", cursive;
    color: var(--ink-soft); font-size: 15px;
  }

  .filters {
    padding: 12px 22px;
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
  }
  .filters button {
    appearance: none; border: 1px solid var(--line);
    background: white;
    padding: 6px 10px; border-radius: 99px;
    font-family: "Dela Gothic One", system-ui;
    font-size: 9px; letter-spacing: 0.8px;
    color: var(--ink-soft); cursor: pointer;
    transition: all 140ms;
  }
  .filters button.active {
    background: var(--paddle-green); color: white;
    border-color: var(--paddle-green);
  }

  .rail__list {
    overflow-y: auto;
    padding: 8px 14px 14px;
  }
  .player {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px;
    border-radius: 12px;
    transition: background 140ms;
  }
  .player:hover { background: var(--paddle-green-soft); }
  .player.is-resting { opacity: 0.55; }
  .player__avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: grid; place-items: center;
    color: white;
    font-family: "Dela Gothic One", system-ui;
    font-size: 12px;
    flex-shrink: 0;
  }
  .player__main { flex: 1; min-width: 0; }
  .player__name {
    font-weight: 700; font-size: 14px; line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .player__name .skill { color: var(--ink-faint); font-weight: 400; margin-left: 4px; }
  .player__status {
    display: inline-block;
    font-family: "Dela Gothic One", system-ui;
    font-size: 8px; letter-spacing: 1px;
    padding: 3px 7px; border-radius: 99px;
    margin-top: 4px;
  }
  .player__status.active { background: rgba(14,146,14,0.12); color: var(--active); }
  .player__status.waiting { background: rgba(199,137,27,0.15); color: var(--warn); }
  .player__status.resting { background: rgba(0,0,0,0.07); color: var(--rest); }
  .player__court {
    font-family: "Dela Gothic One", system-ui;
    font-size: 10px; letter-spacing: 0.5px;
    padding: 4px 8px; border-radius: 8px;
    background: var(--paddle-green); color: white;
  }

  .rail__foot {
    padding: 14px 18px;
    border-top: 1px solid var(--line);
  }
  .rail__foot .add {
    appearance: none; border: none;
    width: 100%; height: 48px;
    border-radius: 12px;
    background: var(--paddle-green); color: white;
    font-family: "Dela Gothic One", system-ui;
    font-size: 13px; letter-spacing: 0.5px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer;
    transition: background 140ms;
  }
  .rail__foot .add:hover { background: var(--paddle-green-dark); }

  /* ===== flash toast ===== */
  .flash {
    position: absolute;
    top: 96px; left: 50%; transform: translateX(-50%);
    background: var(--paddle-green); color: white;
    padding: 14px 22px; border-radius: 14px;
    font-family: "Dela Gothic One", system-ui;
    font-size: 14px; letter-spacing: 0.5px;
    box-shadow: 0 12px 40px -8px rgba(45,119,73,0.5);
    z-index: 10;
    animation: flashIn 260ms cubic-bezier(.2,.9,.3,1.4);
  }
  @keyframes flashIn {
    from { opacity: 0; transform: translate(-50%, -8px) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }

  /* ===== add-player modal (centered, not bottom sheet) ===== */
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.4);
    display: grid; place-items: center;
    z-index: 20;
    animation: fadeIn 200ms ease;
  }
  .modal {
    width: 460px;
    background: white;
    border-radius: 20px;
    padding: 24px 24px 20px;
    animation: modalIn 240ms cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal__head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal__title {
    margin: 0;
    font-family: "Dela Gothic One", system-ui;
    font-size: 20px;
  }
  .modal__close {
    appearance: none; border: 1px solid var(--line);
    background: white; width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer;
    display: grid; place-items: center; color: var(--ink-soft);
  }
  .field { margin-bottom: 14px; }
  .field__label {
    display: block;
    font-family: "Dela Gothic One", system-ui;
    font-size: 11px; letter-spacing: 1px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field__input {
    width: 100%; height: 48px;
    padding: 0 14px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: white;
    font-family: "Chivo", system-ui;
    font-weight: 700; font-size: 15px;
    color: var(--ink);
    transition: border-color 160ms ease, box-shadow 160ms ease;
    outline: none;
  }
  .field__input:focus {
    border-color: var(--paddle-green);
    box-shadow: 0 0 0 3px var(--paddle-green-soft);
  }
  .skill-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  .skill-grid button {
    appearance: none; border: 1.5px solid var(--line);
    background: white; height: 44px; border-radius: 10px;
    font-family: "Dela Gothic One", system-ui;
    font-size: 13px; color: var(--ink); cursor: pointer;
    transition: all 140ms;
  }
  .skill-grid button.active {
    background: var(--paddle-green); color: white;
    border-color: var(--paddle-green);
  }
  .modal__row { display: flex; gap: 8px; margin-top: 8px; }
  .modal__row button {
    flex: 1; height: 50px; border: none; border-radius: 12px;
    font-family: "Dela Gothic One", system-ui;
    font-size: 14px; cursor: pointer;
    transition: background 160ms;
  }
  .modal__row .btn-cancel { background: rgba(0,0,0,0.05); color: var(--ink); flex: 0 0 32%; }
  .modal__row .btn-add { background: var(--paddle-green); color: white; }
  .modal__row .btn-add:disabled { background: rgba(0,0,0,0.12); color: rgba(0,0,0,0.4); cursor: not-allowed; }
  .modal__row .btn-add:hover:not(:disabled) { background: var(--paddle-green-dark); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#2D7749",
      "courtCount": 4
    }/*EDITMODE-END*/;

    const AVATAR_COLORS = [
      "#2D7749","#0E5FBA","#C24A1E","#7A3FB7","#1F1F1F","#C7891B","#2A8C8E","#A02A6E"
    ];
    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }
    function initials(name) {
      return name.split(" ").map(s => s[0]).slice(0,2).join("").toUpperCase();
    }

    const Icon = {
      Back: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
      Plus: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
      QR: () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="4" height="4" stroke="currentColor" strokeWidth="1.4"/><rect x="10" y="2" width="4" height="4" stroke="currentColor" strokeWidth="1.4"/><rect x="2" y="10" width="4" height="4" stroke="currentColor" strokeWidth="1.4"/><rect x="10" y="10" width="2" height="2" fill="currentColor"/><rect x="13" y="13" width="1.5" height="1.5" fill="currentColor"/></svg>,
      User: () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" strokeWidth="1.4"/><path d="M3 14c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
      Edit: () => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 12l2-.5L11 4.5 9.5 3 2.5 10 2 12z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/></svg>,
      X: () => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>,
      Trophy: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2h8v3a4 4 0 01-8 0V2zM5 9h4v3H5V9z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><path d="M3 3H1.5v1.5A1.5 1.5 0 003 6M11 3h1.5v1.5A1.5 1.5 0 0111 6" stroke="currentColor" strokeWidth="1.4"/></svg>,
      Clock: () => <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1.4"/><path d="M6 3v3.2L7.8 7.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
    };

    const SEED_PLAYERS = [
      { name: "Vince",      skill: "3.0", status: "active", court: 1 },
      { name: "Aliza",      skill: "3.0", status: "active", court: 1 },
      { name: "Wilter J.",  skill: "3.0", status: "active", court: 1 },
      { name: "Marcelo L.", skill: "2.5", status: "active", court: 1 },
      { name: "Cheska",     skill: "2.0", status: "active", court: 2 },
      { name: "Rio",        skill: "2.5", status: "active", court: 2 },
      { name: "Joaqui",     skill: "3.5", status: "active", court: 2 },
      { name: "Mae",        skill: "2.5", status: "active", court: 2 },
      { name: "Haru Yuki",  skill: "2.5", status: "waiting" },
      { name: "Dani",       skill: "3.0", status: "waiting" },
      { name: "Niko",       skill: "3.0", status: "waiting" },
      { name: "Ayla",       skill: "2.5", status: "waiting" },
      { name: "Bruno",      skill: "3.5", status: "waiting" },
      { name: "Sage",       skill: "3.0", status: "waiting" },
      { name: "Tomi",       skill: "2.5", status: "resting" },
      { name: "Ren",        skill: "3.0", status: "resting" },
    ];

    function StatusPill({ s }) {
      const label = s === "active" ? "Active match" : s === "waiting" ? "Waiting" : "Resting";
      return <span className={"player__status " + s}>{label}</span>;
    }

    function CourtCard({ idx, players, fadingTeam, onWinner, onQueue }) {
      const team1 = players.slice(0,2);
      const team2 = players.slice(2,4);
      const filled = players.length === 4;

      if (!filled) {
        return (
          <div className="court court--empty">
            <div className="court__head">
              <span className="court__name">Court {idx}</span>
              <span className="court__status empty">Empty</span>
            </div>
            <div className="court__body">
              <div className="icon"><Icon.User /></div>
              <p>No active match.<br/>Queue 4 waiting players to start.</p>
              <button className="queue-cta" onClick={onQueue}>QUEUE PLAYERS</button>
            </div>
          </div>
        );
      }

      const fading = !!fadingTeam;
      return (
        <div className={"court" + (fading ? " is-fading" : "")}>
          <div className="court__head">
            <span className="court__name">Court {idx}</span>
            <span className="court__status live">Live</span>
            <span className="timer"><Icon.Clock /> 12:34</span>
            <button className="court__edit" aria-label="Edit"><Icon.Edit /></button>
          </div>
          <div className="match">
            <div className={"team " + (fading ? (fadingTeam === '1' ? 'team--win' : 'team--lose') : '')}>
              <div className="team__title">TEAM 1</div>
              {team1.map(p => (
                <div className="team__player" key={p.name}>
                  <div className="team__avatar" style={{background: avatarColor(p.name)+"22", color: avatarColor(p.name)}}>{initials(p.name)}</div>
                  <div>
                    <div className="team__name">{p.name}</div>
                    <div className="team__skill">({p.skill})</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="match__divider">VS</div>
            <div className={"team " + (fading ? (fadingTeam === '2' ? 'team--win' : 'team--lose') : '')}>
              <div className="team__title">TEAM 2</div>
              {team2.map(p => (
                <div className="team__player" key={p.name}>
                  <div className="team__avatar" style={{background: avatarColor(p.name)+"22", color: avatarColor(p.name)}}>{initials(p.name)}</div>
                  <div>
                    <div className="team__name">{p.name}</div>
                    <div className="team__skill">({p.skill})</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="court__actions">
            <button className="winner-btn" onClick={() => onWinner('1')}>
              <Icon.Trophy />
              <span><small>Winner</small>TEAM 1</span>
            </button>
            <button className="winner-btn" onClick={() => onWinner('2')}>
              <Icon.Trophy />
              <span><small>Winner</small>TEAM 2</span>
            </button>
          </div>
        </div>
      );
    }

    function App({ t, setTweak }) {
      useEffect(() => {
        document.documentElement.style.setProperty("--paddle-green", t.accent);
      }, [t.accent]);

      const [filter, setFilter] = useState("waiting");
      const [players, setPlayers] = useState(SEED_PLAYERS);
      const [flash, setFlash] = useState(null);
      const [fadingByCourt, setFadingByCourt] = useState({});
      const [showAdd, setShowAdd] = useState(false);
      const [newName, setNewName] = useState("");
      const [newSkill, setNewSkill] = useState("3.0");

      const courtCount = t.courtCount;

      const playersByCourt = useMemo(() => {
        const m = {};
        players.forEach(p => { if (p.court) (m[p.court] ||= []).push(p); });
        return m;
      }, [players]);

      const counts = {
        all: players.length,
        active: players.filter(p => p.status==='active').length,
        waiting: players.filter(p => p.status==='waiting').length,
        resting: players.filter(p => p.status==='resting').length,
      };
      const filtered = filter === "all" ? players : players.filter(p => p.status === filter);

      const showFlash = (msg, ms=1600) => {
        setFlash(msg);
        setTimeout(() => setFlash(null), ms);
      };

      const handleWinner = (courtIdx, team) => {
        if (fadingByCourt[courtIdx]) return;
        showFlash(`Team ${team} wins court ${courtIdx}!`, 1600);
        setFadingByCourt(prev => ({ ...prev, [courtIdx]: team }));
        setTimeout(() => {
          setPlayers(prev => prev.map(p => {
            if (p.court !== courtIdx) return p;
            return { ...p, court: undefined, status: 'waiting' };
          }));
          setFadingByCourt(prev => {
            const next = { ...prev };
            delete next[courtIdx];
            return next;
          });
        }, 1900);
      };

      const handleQueue = (courtIdx) => {
        const waiting = players.filter(p => p.status === 'waiting').slice(0, 4);
        if (waiting.length < 4) {
          showFlash(`Need ${4 - waiting.length} more players to start a match`);
          return;
        }
        const waitingNames = new Set(waiting.map(w => w.name));
        setPlayers(prev => prev.map(p =>
          waitingNames.has(p.name) ? { ...p, status: 'active', court: courtIdx } : p
        ));
        showFlash(`Court ${courtIdx} is up — match started!`);
      };

      const openAddSheet = () => {
        setNewName("");
        setNewSkill("3.0");
        setShowAdd(true);
      };
      const submitAdd = () => {
        const trimmed = newName.trim();
        if (!trimmed) return;
        setPlayers(prev => [...prev, { name: trimmed, skill: newSkill, status: "waiting" }]);
        setShowAdd(false);
        showFlash(`${trimmed} added to the queue`);
      };

      return (
        <div className="ipad" data-screen-label="01 Court (web)">
          <div className="ipad__screen">
            {/* topbar */}
            <div className="topbar">
              <button className="topbar__back" aria-label="Back"><Icon.Back /></button>
              <div className="topbar__brand">
                <img src="assets/logo.png" alt="" />
                <span className="wordmark">PADDLEQ</span>
              </div>
              <div className="meta-row" style={{marginLeft: 14}}>
                <span>{courtCount} COURTS</span>
                <span className="dot"></span>
                <span>DOUBLES</span>
                <span className="dot" style={{background: 'var(--warn)'}}></span>
                <span>{counts.active} PLAYING</span>
                <span className="dot" style={{background: '#0E5FBA'}}></span>
                <span>{counts.waiting} IN QUEUE</span>
              </div>
              <div className="topbar__spacer"></div>
              <button className="topbar__icon" aria-label="QR"><Icon.QR /></button>
              <button className="topbar__icon" aria-label="Profile"><Icon.User /></button>
            </div>

            {/* main court grid */}
            <div className="main">
              <div className="main__head">
                <h2 className="main__title">Live courts</h2>
                <span className="main__sub">tap a winner to clear the court</span>
              </div>
              <div className="court-grid" style={{
                gridTemplateColumns: courtCount <= 2 ? '1fr' : '1fr 1fr',
                gridTemplateRows: courtCount <= 1 ? '1fr' : courtCount <= 4 ? '1fr 1fr' : '1fr 1fr 1fr',
              }}>
                {Array.from({length: courtCount}).map((_, i) => {
                  const idx = i + 1;
                  return (
                    <CourtCard
                      key={idx}
                      idx={idx}
                      players={playersByCourt[idx] || []}
                      fadingTeam={fadingByCourt[idx]}
                      onWinner={(team) => handleWinner(idx, team)}
                      onQueue={() => handleQueue(idx)}
                    />
                  );
                })}
              </div>
            </div>

            {/* right rail — queue / players */}
            <aside className="rail">
              <div className="rail__head">
                <h3 className="rail__title">
                  Players
                  <span className="pill">{counts.all}</span>
                </h3>
                <div className="rail__sub">{counts.waiting} waiting · {counts.active} on court</div>
              </div>
              <div className="filters">
                <button className={filter==='waiting'?'active':''} onClick={() => setFilter('waiting')}>WAITING · {counts.waiting}</button>
                <button className={filter==='active'?'active':''} onClick={() => setFilter('active')}>PLAYING · {counts.active}</button>
                <button className={filter==='resting'?'active':''} onClick={() => setFilter('resting')}>RESTING · {counts.resting}</button>
                <button className={filter==='all'?'active':''} onClick={() => setFilter('all')}>ALL · {counts.all}</button>
              </div>
              <div className="rail__list">
                {filtered.map((p, i) => (
                  <div className={"player" + (p.status==='resting'?' is-resting':'')} key={p.name}>
                    {filter === 'waiting' && (
                      <div style={{
                        width: 22, fontFamily: '"Dela Gothic One", system-ui',
                        fontSize: 12, color: 'var(--ink-faint)', textAlign: 'center'
                      }}>{i+1}</div>
                    )}
                    <div className="player__avatar" style={{background: avatarColor(p.name)}}>{initials(p.name)}</div>
                    <div className="player__main">
                      <div className="player__name">{p.name} <span className="skill">({p.skill})</span></div>
                      <StatusPill s={p.status} />
                    </div>
                    {p.court && <span className="player__court">C{p.court}</span>}
                  </div>
                ))}
                {filtered.length === 0 && (
                  <div style={{
                    padding: '40px 20px', textAlign: 'center',
                    color: 'var(--ink-faint)', fontFamily: '"Covered By Your Grace", cursive',
                    fontSize: 16,
                  }}>nobody here yet</div>
                )}
              </div>
              <div className="rail__foot">
                <button className="add" onClick={openAddSheet}>
                  <Icon.Plus /> Add player
                </button>
              </div>
            </aside>

            {/* flash toast */}
            {flash && <div className="flash" key={flash}>{flash}</div>}

            {/* add modal */}
            {showAdd && (
              <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) setShowAdd(false); }}>
                <div className="modal">
                  <div className="modal__head">
                    <h3 className="modal__title">Add player</h3>
                    <button className="modal__close" aria-label="Close" onClick={() => setShowAdd(false)}><Icon.X /></button>
                  </div>
                  <div className="field">
                    <label className="field__label" htmlFor="player-name">Name</label>
                    <input
                      id="player-name"
                      className="field__input"
                      placeholder="e.g. HARU YUKI"
                      value={newName}
                      onChange={(e) => setNewName(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter') submitAdd(); }}
                      autoFocus
                    />
                  </div>
                  <div className="field">
                    <label className="field__label">Skill level</label>
                    <div className="skill-grid">
                      {["2.0","2.5","3.0","3.5","4.0"].map(s => (
                        <button
                          key={s}
                          type="button"
                          className={s === newSkill ? "active" : ""}
                          onClick={() => setNewSkill(s)}
                        >{s}</button>
                      ))}
                    </div>
                  </div>
                  <div className="modal__row">
                    <button className="btn-cancel" onClick={() => setShowAdd(false)}>Cancel</button>
                    <button className="btn-add" disabled={!newName.trim()} onClick={submitAdd}>
                      Add to queue
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Root() {
      const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <App t={t} setTweak={setTweak} />

          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Brand">
              <window.TweakColor label="Accent" value={t.accent}
                options={["#2D7749","#0E5FBA","#C24A1E","#1F1F1F","#7A3FB7"]}
                onChange={(v) => setTweak('accent', v)} />
            </window.TweakSection>
            <window.TweakSection label="Layout">
              <window.TweakSlider label="Number of courts" value={t.courtCount}
                min={1} max={6} step={1}
                onChange={(v) => setTweak('courtCount', v)} />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
